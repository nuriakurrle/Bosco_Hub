# docker-compose.prod.yml — Despliegue TODO-EN-UNO para el servidor (VPS).
#
# Levanta las 3 piezas en un solo servidor, conectadas por una red interna:
#   - postgres   : base de datos compartida (NO se expone a internet)
#   - n8n        : agente que lee emails y escribe los inquiries (puerto 5678)
#   - dashboard  : la web Next.js que ve el equipo (puerto 80)
#
# Las contraseñas y la IP/dominio se leen del archivo .env (ver .env.prod.example).
# Uso en el servidor:
#   docker compose -f docker-compose.prod.yml up -d --build

name: zuk_proto

services:
  postgres:
    image: postgres:16-alpine
    container_name: zuk-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=Europe/Berlin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Crea el esquema (tablas inquiries, etc.) en el PRIMER arranque.
      - ./n8n/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Sin "ports": la base de datos solo es accesible por las otras piezas,
    # nunca desde internet. Para inspeccionarla: docker compose exec postgres psql -U zuk -d zuk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: zuk-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Sin "ports": n8n ya no se expone directo. Se accede por HTTPS a través de Caddy
    # en https://n8n.boscohub.duckdns.org
    environment:
      # Login de la interfaz de n8n. CÁMBIALO en .env antes de desplegar.
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      # Clave para cifrar las credenciales guardadas (Outlook, etc.). CÁMBIALA.
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Dominio público por HTTPS (detrás del proxy Caddy).
      - N8N_HOST=n8n.boscohub.duckdns.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.boscohub.duckdns.org/
      # n8n está detrás de 1 proxy (Caddy): confía en sus cabeceras X-Forwarded.
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
      # Los workflows del repo, montados de solo lectura. El CI los reimporta en
      # cada deploy (git = fuente de verdad). Ver el paso "Sincronizar workflows"
      # en .github/workflows/deploy.yml
      - ./n8n/zuk_email_agent_prototype_v1.json:/workflows/email-agent.json:ro
      - ./n8n/zuk_send_email.json:/workflows/send-email.json:ro
      - ./n8n/zuk_send_contract.json:/workflows/send-contract.json:ro
      - ./n8n/zuk_email_agent_v2.json:/workflows/email-agent-v2.json:ro

  dashboard:
    # Se construye desde el Dockerfile de este repo.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zuk-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Sin "ports": el dashboard ya no se expone directo. Se accede por HTTPS con
    # login a través de Caddy en https://boscohub.duckdns.org
    environment:
      # Conexiones INTERNAS por nombre de servicio (red de docker), no localhost.
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - N8N_BASE_URL=http://n8n:5678
      - NODE_ENV=production
      # Para la transcripción de llamadas (Whisper en el endpoint /api/live-call/transcribe).
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Para servir las grabaciones de Twilio (proxy /api/live-call/recording/[id]).
      # Si faltan, el reproductor responde 503 — no rompe nada más.
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}

  live-call:
    # Microservicio de transcripción en vivo (Fase 3b). Sin "ports": se accede por
    # wss a través de Caddy en https://live.boscohub.duckdns.org
    build:
      context: ./live-call
    container_name: zuk-live-call
    restart: unless-stopped
    depends_on:
      - dashboard
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Al colgar, el microservicio guarda la llamada llamando al dashboard. En la
      # red de Docker el dashboard es el servicio `dashboard`, NO localhost.
      - DASHBOARD_URL=http://dashboard:3000
      - TZ=Europe/Berlin

  caddy:
    # Proxy inverso con HTTPS automático (Let's Encrypt). Es la única pieza
    # expuesta a internet: recibe el tráfico y lo reparte al dashboard y a n8n.
    image: caddy:2-alpine
    container_name: zuk-caddy
    restart: unless-stopped
    depends_on:
      - dashboard
      - n8n
      - live-call
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  n8n_data:
  postgres_data:
  caddy_data:
  caddy_config:
