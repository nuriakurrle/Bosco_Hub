# docker-compose.prod.yml — Despliegue TODO-EN-UNO para el servidor (VPS).
#
# Levanta las 3 piezas en un solo servidor, conectadas por una red interna:
#   - postgres   : base de datos compartida (NO se expone a internet)
#   - n8n        : agente que lee emails y escribe los inquiries (puerto 5678)
#   - dashboard  : la web Next.js que ve el equipo (puerto 80)
#
# Las contraseñas y la IP/dominio se leen del archivo .env (ver .env.prod.example).
# Uso en el servidor:
#   docker compose -f docker-compose.prod.yml up -d --build

name: zuk_proto

services:
  postgres:
    image: postgres:16-alpine
    container_name: zuk-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=Europe/Berlin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Crea el esquema (tablas inquiries, etc.) en el PRIMER arranque.
      - ./n8n/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Sin "ports": la base de datos solo es accesible por las otras piezas,
    # nunca desde internet. Para inspeccionarla: docker compose exec postgres psql -U zuk -d zuk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: zuk-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      # Login de la interfaz de n8n. CÁMBIALO en .env antes de desplegar.
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      # Clave para cifrar las credenciales guardadas (Outlook, etc.). CÁMBIALA.
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # URL pública del servidor (IP o dominio), usada por los webhooks.
      - N8N_HOST=${SERVER_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${SERVER_HOST}:5678/
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
      # Los workflows del repo, montados de solo lectura para auto-importarse.
      - ./n8n/zuk_email_agent_prototype_v1.json:/workflows/email-agent.json:ro
      - ./n8n/zuk_send_email.json:/workflows/send-email.json:ro
    # En el PRIMER arranque (sin el archivo-marcador) importa los dos workflows
    # y luego arranca. En reinicios posteriores no los reimporta, para no
    # pisar los cambios hechos desde la interfaz (p.ej. la credencial de Outlook).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        if [ ! -f /home/node/.n8n/.workflows-imported ]; then
        echo "n8n: primer arranque, importando workflows ...";
        n8n import:workflow --input=/workflows/email-agent.json || true;
        n8n import:workflow --input=/workflows/send-email.json || true;
        touch /home/node/.n8n/.workflows-imported;
        fi;
        exec n8n start

  dashboard:
    # Se construye desde el Dockerfile de este repo.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zuk-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # El equipo entra por el puerto 80 -> http://IP-DEL-SERVIDOR
    ports:
      - "80:3000"
    environment:
      # Conexiones INTERNAS por nombre de servicio (red de docker), no localhost.
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - N8N_BASE_URL=http://n8n:5678
      - NODE_ENV=production

volumes:
  n8n_data:
  postgres_data:
