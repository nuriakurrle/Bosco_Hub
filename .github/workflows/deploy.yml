# CI/CD — Arranque y despliegue automático del servidor.
#
# Con un servidor Ubuntu VACÍO (solo con la SSH key de despliegue), cada "git push"
# a main deja todo montado y actualizado solo:
#   1. Reconstruye la clave SSH (guardada en base64, una sola línea).
#   2. Crea el .env con las contraseñas (desde los secretos de GitHub).
#   3. Copia el código al servidor.
#   4. Instala Docker si no está y levanta las 3 piezas.
#
# Secretos en GitHub (Settings > Secrets and variables > Actions):
#   SSH_HOST                  -> IP pública del servidor (ej. 167.233.92.90)
#   SSH_USER                  -> root
#   SSH_PRIVATE_KEY           -> clave SSH privada EN BASE64 (una sola línea)
#   POSTGRES_PASSWORD         -> contraseña de la base de datos
#   N8N_BASIC_AUTH_PASSWORD   -> contraseña para entrar a n8n
#   N8N_ENCRYPTION_KEY        -> clave para cifrar credenciales de n8n

name: Deploy a producción

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Reconstruir la clave SSH
        run: |
          mkdir -p ~/.ssh
          # Quita cualquier espacio/salto de línea y decodifica el base64.
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          # Verifica que la clave es legible; si no, falla con un mensaje claro.
          ssh-keygen -y -f ~/.ssh/deploy > /dev/null || { echo "❌ El secreto SSH_PRIVATE_KEY no es la clave en base64 correcta."; exit 1; }

      - name: Crear el .env con las contraseñas
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Deja solo los caracteres válidos de una API key (quita espacios,
          # saltos y cualquier carácter invisible que se cuele al pegar el secreto).
          OPENAI_API_KEY=$(printf '%s' "$OPENAI_API_KEY" | tr -cd 'A-Za-z0-9_-')
          cat > .env <<EOF
          POSTGRES_USER=zuk
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=zuk
          N8N_BASIC_AUTH_USER=zuk
          N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
          N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          SERVER_HOST=${SSH_HOST}
          EOF

      - name: Copiar el código al servidor
        run: |
          SSH="ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=no"
          $SSH ${SSH_USER}@${SSH_HOST} 'mkdir -p /root/Bosco_Hub'
          tar czf - --exclude=.git --exclude=node_modules --exclude=.next . \
            | $SSH ${SSH_USER}@${SSH_HOST} 'tar xzf - -C /root/Bosco_Hub'

      - name: Instalar Docker y desplegar
        run: |
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} 'bash -s' <<'ENDSSH'
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            echo "Instalando Docker (primer arranque)..."
            curl -fsSL https://get.docker.com | sh
          fi
          cd /root/Bosco_Hub
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f
          # Sincroniza el esquema de Postgres en cada deploy. init.sql SOLO corre
          # cuando el volumen está vacío (primer arranque); al cambiar el esquema
          # (nuevas columnas/tablas) hay que re-aplicarlo. Las migraciones del final
          # son idempotentes (ALTER/CREATE IF NOT EXISTS); los INSERT de seed que ya
          # existen fallan por PK y se ignoran (por eso "|| true").
          docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U zuk -t 30 || true
          cat n8n/init.sql | docker compose -f docker-compose.prod.yml exec -T postgres psql -U zuk -d zuk -v ON_ERROR_STOP=0 || true
          # Recrea Caddy para que cargue el Caddyfile actual del host (nuevos
          # dominios/login). NO sirve "cp + reload": el Caddyfile está montado :ro
          # y el cp falla ("device or resource busy"). force-recreate sí aplica.
          docker compose -f docker-compose.prod.yml up -d --force-recreate caddy
          ENDSSH

      - name: Sincronizar workflows de n8n desde git
        run: |
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} 'bash -s' <<'ENDSSH'
          set -e
          cd /root/Bosco_Hub
          DC="docker compose -f docker-compose.prod.yml"
          # Espera a que el contenedor de n8n responda antes de importar.
          echo "Esperando a que n8n esté listo..."
          for i in $(seq 1 30); do
            if $DC exec -T n8n n8n --version >/dev/null 2>&1; then break; fi
            sleep 3
          done
          # Copia los JSON DENTRO del contenedor con "docker compose cp" y reimporta
          # desde ahí. IMPORTANTE: no importamos desde el mount (/workflows/...) porque
          # al ser un mount de archivo único queda obsoleto cuando el deploy reemplaza
          # el archivo en el host -> el contenedor seguiría viendo la versión vieja.
          echo "Copiando e importando workflows..."
          $DC cp n8n/zuk_email_agent_prototype_v1.json n8n:/tmp/wf1.json
          $DC cp n8n/zuk_send_email.json n8n:/tmp/wf2.json
          $DC cp n8n/zuk_send_contract.json n8n:/tmp/wf3.json
          $DC cp n8n/zuk_email_agent_v2.json n8n:/tmp/wf4.json
          $DC exec -T n8n n8n import:workflow --input=/tmp/wf1.json || true
          $DC exec -T n8n n8n import:workflow --input=/tmp/wf2.json || true
          $DC exec -T n8n n8n import:workflow --input=/tmp/wf3.json || true
          # v2 (agente tool-calling): se IMPORTA pero NO se activa (publish) — es de
          # prueba. Se promueve manualmente cuando esté validado.
          $DC exec -T n8n n8n import:workflow --input=/tmp/wf4.json || true
          # Publica (activa) cada workflow por su ID. En esta versión de n8n
          # "--all" ya no existe: hay que hacerlo uno por uno con publish:workflow.
          $DC exec -T n8n n8n publish:workflow --id=fEejzwIFeoSDGVm6 || true
          $DC exec -T n8n n8n publish:workflow --id=zuksendmail00001 || true
          $DC exec -T n8n n8n publish:workflow --id=zuksendcontract1 || true
          # Reinicia n8n para que cargue y active lo importado (no lo hace en caliente).
          echo "Reiniciando n8n para aplicar los cambios..."
          $DC restart n8n
          # Verifica que AMBOS workflows quedaron activos; si no, reintenta una vez.
          # (activar el trigger de Outlook a veces no engancha al primer reinicio.)
          sleep 15
          ACTIVOS=$($DC exec -T n8n n8n list:workflow --active=true 2>/dev/null || true)
          if ! echo "$ACTIVOS" | grep -q fEejzwIFeoSDGVm6 || ! echo "$ACTIVOS" | grep -q zuksendmail00001 || ! echo "$ACTIVOS" | grep -q zuksendcontract1; then
            echo "Activación incompleta — reintentando..."
            $DC exec -T n8n n8n publish:workflow --id=fEejzwIFeoSDGVm6 || true
            $DC exec -T n8n n8n publish:workflow --id=zuksendmail00001 || true
            $DC exec -T n8n n8n publish:workflow --id=zuksendcontract1 || true
            $DC restart n8n
            sleep 15
          fi
          echo "Workflows activos tras el deploy:"
          $DC exec -T n8n n8n list:workflow --active=true || true
          ENDSSH
