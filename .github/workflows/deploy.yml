# CI/CD — Arranque y despliegue automático del servidor.
#
# Con un servidor Ubuntu VACÍO (solo con la SSH key de despliegue), cada "git push"
# a main deja todo montado y actualizado solo:
#   1. Instala Docker si no está (primer arranque).
#   2. Copia el código del repo al servidor.
#   3. Crea el archivo .env con las contraseñas (desde los secretos de GitHub).
#   4. Levanta / actualiza las 3 piezas (postgres + n8n + dashboard).
#
# Secretos a configurar en GitHub (Settings > Secrets and variables > Actions):
#   SSH_HOST                  -> IP pública del servidor (ej. 5.75.123.45)
#   SSH_USER                  -> root
#   SSH_PRIVATE_KEY           -> clave SSH privada de despliegue
#   POSTGRES_PASSWORD         -> contraseña de la base de datos
#   N8N_BASIC_AUTH_PASSWORD   -> contraseña para entrar a n8n
#   N8N_ENCRYPTION_KEY        -> clave para cifrar credenciales de n8n

name: Deploy a producción

on:
  push:
    branches: [main]
  # Permite lanzarlo a mano desde la pestaña Actions de GitHub.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Copiar el código al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/root/Bosco_Hub"
          # No borra el destino: así se conserva el .env y nada se pierde entre despliegues.
          rm: false

      - name: Instalar Docker, crear .env y desplegar
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          SERVER_HOST: ${{ secrets.SSH_HOST }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,N8N_BASIC_AUTH_PASSWORD,N8N_ENCRYPTION_KEY,SERVER_HOST
          script: |
            set -e
            # 1) Instalar Docker solo la primera vez.
            if ! command -v docker >/dev/null 2>&1; then
              echo "Instalando Docker (primer arranque)..."
              curl -fsSL https://get.docker.com | sh
            fi
            cd /root/Bosco_Hub
            # 2) Crear/actualizar el .env con las contraseñas de los secretos.
            cat > .env <<EOF
            POSTGRES_USER=zuk
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=zuk
            N8N_BASIC_AUTH_USER=zuk
            N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
            N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
            SERVER_HOST=${SERVER_HOST}
            EOF
            # 3) Levantar / actualizar las 3 piezas.
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
