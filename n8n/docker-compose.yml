# name pins the Compose project name. This way the volumes keep the names
# zuk_proto_postgres_data / zuk_proto_n8n_data even though this folder is n8n/,
# and we keep the data that already existed (no new empty database is created).
name: zuk_proto

services:
  postgres:
    image: postgres:16-alpine
    container_name: zuk-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zuk
      - POSTGRES_PASSWORD=zuk_prototype_2026
      - POSTGRES_DB=zuk
      - TZ=Europe/Berlin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuk -d zuk"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: zuk-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      # Basic auth on the n8n UI. Change these before sharing.
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=zuk
      - N8N_BASIC_AUTH_PASSWORD=zuk_prototype_2026
      # Local URL and timezone
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      # Quiet down deprecation warnings on first run
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
      # Workflow files from the repo, mounted read-only so they can be auto-imported.
      - ./zuk_email_agent_prototype_v1.json:/workflows/email-agent.json:ro
      - ./zuk_send_email.json:/workflows/send-email.json:ro
    # On startup: only the FIRST time (no marker file yet) import the two workflows
    # from /workflows, then start. The marker lives in the n8n volume, so later
    # restarts skip the import and never overwrite UI changes (e.g. assigned
    # credentials). A full reset (docker compose down -v) removes the marker, so a
    # fresh install imports them again.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        if [ ! -f /home/node/.n8n/.workflows-imported ]; then
        echo "n8n: first run, importing workflows from /workflows ...";
        n8n import:workflow --input=/workflows/email-agent.json || true;
        n8n import:workflow --input=/workflows/send-email.json || true;
        touch /home/node/.n8n/.workflows-imported;
        fi;
        exec n8n start

volumes:
  n8n_data:
  postgres_data:
